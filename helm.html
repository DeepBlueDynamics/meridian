<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MERIDIAN — Helm</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Public+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0a0f18; --bg-2:#131a26; --line:#1f2a3d; --line-bright:#324863;
    --ink:#e8ecf3; --ink-dim:#9ba8bd; --ink-faint:#54627c; --ink-fade:#2a3548;
    --envelope:#f9a826; --mean:#f4f7fc; --hot:#e94560; --cool:#4ecdc4; --warn:#ffb938; --cur:#4fa3ff;
    --serif:'Instrument Serif',serif; --sans:'Public Sans',sans-serif; --mono:'Fira Code',monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100vh; background:var(--bg); color:var(--ink); font-family:var(--sans); overflow:hidden; }
  #app { display:grid; grid-template-rows:auto 1fr auto; height:100vh; }

  /* unified single-pane canvas — super minimal */
  #canvas { overflow-y:auto; padding:14px 16px; }
  #board { display:grid; grid-template-columns:repeat(12, 1fr); gap:10px; max-width:1720px; margin:0 auto; }

  .widget { background:var(--bg-2); border:1px solid var(--line-bright); border-radius:6px; position:relative; min-width:0; }
  .widget .wx { position:absolute; top:6px; right:8px; z-index:3; background:transparent; border:none; color:var(--ink-faint);
    font-family:var(--mono); font-size:12px; cursor:pointer; padding:2px 5px; }
  .widget .wx:hover { color:var(--hot); }
  .widget.inst { grid-column:span 12; border:none; background:transparent; }
  .widget.view { grid-column:span 6; height:420px; overflow:hidden; }
  .widget.view.full { grid-column:span 12; height:560px; }
  .widget.view iframe { width:100%; height:100%; border:none; display:block; background:var(--bg); }
  .widget.view .vtag { position:absolute; left:10px; top:8px; z-index:3; font-family:var(--mono); font-size:9px;
    letter-spacing:0.22em; color:var(--ink-dim); background:rgba(10,15,24,0.8); padding:3px 8px; border-radius:3px;
    text-transform:uppercase; pointer-events:none; }

  .cells { display:grid; grid-template-columns:repeat(auto-fill, minmax(185px, 1fr)); gap:10px; }
  .cell { background:var(--bg-2); border:1px solid var(--line-bright); border-radius:6px; padding:12px 14px 10px; min-height:100px;
    display:flex; flex-direction:column; }
  .cell .label { font-family:var(--mono); font-size:9.5px; letter-spacing:0.25em; color:var(--ink-faint); text-transform:uppercase; }
  .cell .value { font-family:var(--mono); font-size:32px; font-weight:500; color:var(--cool); line-height:1.15; margin-top:7px; }
  .cell .value .unit { font-size:12px; color:var(--ink-faint); margin-left:4px; }
  .cell .value.small { font-size:19px; }
  .cell .sub { font-family:var(--mono); font-size:9.5px; color:var(--ink-dim); margin-top:auto; padding-top:6px; }
  .cell.wide { grid-column:span 2; }
  .stale .value { color:var(--ink-faint); }

  /* the chat / command line — this drives the whole pane */
  #cmdbar { border-top:1px solid var(--line); background:linear-gradient(0deg,#060a13,var(--bg)); padding:10px 16px; }
  #cmdwrap { max-width:1720px; margin:0 auto; display:flex; align-items:center; gap:10px; }
  #cmdhint { font-family:var(--mono); font-size:9.5px; color:var(--ink-faint); letter-spacing:0.06em; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; }
  #cmd { flex:1; background:var(--bg-2); border:1px solid var(--line-bright); border-radius:5px; color:var(--ink);
    font-family:var(--mono); font-size:12.5px; padding:9px 12px; outline:none; }
  #cmd:focus { border-color:var(--cool); }
  .simbadge { color:var(--warn); border:1px solid var(--warn); padding:3px 9px; border-radius:3px; letter-spacing:0.15em;
    font-family:var(--mono); font-size:9.5px; display:none; white-space:nowrap; }
  .simbadge.on { display:inline-block; }
</style>
</head>
<body>
<div id="app">
  <header data-meridian-header="Helm">
    <span class="live" id="liveStamp">—</span>
  </header>

  <div id="canvas"><div id="board"></div></div>

  <div id="cmdbar">
    <div id="cmdwrap">
      <span class="simbadge" id="simBadge">⚠ SIM</span>
      <input id="cmd" placeholder="helm ▸ add routing · remove radio · only instruments · show sog tws depth · connect localhost:3000 · sim off · reset" autocomplete="off" />
      <span id="cmdhint"></span>
    </div>
  </div>
</div>

<script src="lib/telemetry.js"></script>
<script src="lib/topbar.js"></script>
<script>
// ── Helm: the unified single-pane view. A chat/command line re-flows the
// board — instrument cells (Signal K live data) and embedded elements of the
// other views (routing / layers / harbor / radio as live iframes). Until a
// real signalk-server is connected the instruments run on a page simulator,
// ALWAYS self-identified by the SIM badge. The MCP agent drives this pane
// through window.m.command(text) — same grammar as the human.
const $=id=>document.getElementById(id);

// ── instrument definitions ──
const CELLS=[
  { id:'sog',   label:'SOG',         path:'navigation.speedOverGround',        unit:'kn', fmt:v=>v.toFixed(1) },
  { id:'stw',   label:'STW',         path:'navigation.speedThroughWater',      unit:'kn', fmt:v=>v.toFixed(1) },
  { id:'cog',   label:'COG',         path:'navigation.courseOverGroundTrue',   unit:'°',  fmt:v=>String(Math.round(v)).padStart(3,'0') },
  { id:'hdg',   label:'HDG true',    path:'navigation.headingTrue',            unit:'°',  fmt:v=>String(Math.round(v)).padStart(3,'0') },
  { id:'aws',   label:'AWS',         path:'environment.wind.speedApparent',    unit:'kn', fmt:v=>v.toFixed(1) },
  { id:'awa',   label:'AWA',         path:'environment.wind.angleApparent',    unit:'°',  fmt:v=>(v>0?'+':'')+Math.round(v) },
  { id:'tws',   label:'TWS',         path:'environment.wind.speedTrue',        unit:'kn', fmt:v=>v.toFixed(1) },
  { id:'twd',   label:'TWD',         path:'environment.wind.directionTrue',    unit:'°',  fmt:v=>String(Math.round(v)).padStart(3,'0') },
  { id:'depth', label:'Depth',       path:'environment.depth.belowTransducer', unit:'m',  fmt:v=>v.toFixed(1) },
  { id:'wtemp', label:'Water',       path:'environment.water.temperature',     unit:'°C', fmt:v=>v.toFixed(1) },
  { id:'drift', label:'Current',     path:'environment.current.drift',         unit:'kn', fmt:v=>v.toFixed(1) },
  { id:'set',   label:'Current set', path:'environment.current.setTrue',       unit:'°',  fmt:v=>String(Math.round(v)).padStart(3,'0') },
  { id:'pos',   label:'Position',    path:'navigation.position',               unit:'',   wide:true, small:true,
    fmt:v=>fmtLat(v.latitude)+'  ·  '+fmtLon(v.longitude) },
];
function fmtLat(v){ const h=v>=0?'N':'S', a=Math.abs(v), d=Math.floor(a); return d+'°'+((a-d)*60).toFixed(3)+"'"+h; }
function fmtLon(v){ const h=v>=0?'E':'W', a=Math.abs(v), d=Math.floor(a); return d+'°'+((a-d)*60).toFixed(3)+"'"+h; }
const VIEW_SRC={ routing:'routing.html', layers:'layers.html', harbor:'index.html', radio:'radio.html' };

// ── board layout (persisted) ──
// blocks: {kind:'inst', cells:[ids]} | {kind:'view', name, full?}
function defaultLayout(){ return { blocks:[{kind:'inst', cells:CELLS.map(c=>c.id)}] }; }
let layout;
try{ layout=JSON.parse(localStorage.getItem('meridian.helm.layout'))||defaultLayout(); }catch(e){ layout=defaultLayout(); }
function saveLayout(){ try{ localStorage.setItem('meridian.helm.layout',JSON.stringify(layout)); }catch(e){} }

function renderBoard(){
  const board=$('board'); board.innerHTML='';
  for(let i=0;i<layout.blocks.length;i++){
    const b=layout.blocks[i];
    const w=document.createElement('div');
    if(b.kind==='inst'){
      w.className='widget inst';
      const cells=document.createElement('div'); cells.className='cells';
      for(const cid of b.cells){
        const c=CELLS.find(x=>x.id===cid); if(!c)continue;
        const div=document.createElement('div');
        div.className='cell'+(c.wide?' wide':'')+' stale'; div.id='cell-'+c.id;
        div.innerHTML='<div class="label">'+c.label+'</div>'+
          '<div class="value'+(c.small?' small':'')+'"><span id="v-'+c.id+'">—</span><span class="unit">'+c.unit+'</span></div>'+
          '<div class="sub" id="s-'+c.id+'">no data</div>';
        cells.appendChild(div);
      }
      w.appendChild(cells);
    }else{
      w.className='widget view'+(b.full?' full':'');
      w.innerHTML='<div class="vtag">'+b.name+'</div>'+
        '<button class="wx" title="remove">✕</button>'+
        '<iframe src="'+VIEW_SRC[b.name]+'"></iframe>';
      w.querySelector('.wx').addEventListener('click',()=>{ layout.blocks.splice(i,1); saveLayout(); renderBoard(); });
    }
    board.appendChild(w);
  }
  refreshAllCells();
}

// ── command grammar (human types it; the agent calls window.m.command) ──
function hint(t){ $('cmdhint').textContent=t; }
function command(raw){
  const txt=String(raw||'').trim().toLowerCase(); if(!txt)return 'empty';
  const [verb,...rest]=txt.split(/\s+/); const args=rest.join(' ');
  const instBlock=()=>{ let b=layout.blocks.find(x=>x.kind==='inst');
    if(!b){ b={kind:'inst',cells:[]}; layout.blocks.unshift(b); } return b; };
  const isView=n=>!!VIEW_SRC[n];
  const cellIds=CELLS.map(c=>c.id);
  const apply=()=>{ saveLayout(); renderBoard(); };
  switch(verb){
    case 'add': case 'show': case 'open': {
      if(!args)return hint('add what? routing · layers · harbor · radio · instruments · '+cellIds.join(' '));
      for(const name of args.split(/[\s,]+/)){
        if(isView(name)){ if(!layout.blocks.some(b=>b.kind==='view'&&b.name===name))layout.blocks.push({kind:'view',name}); }
        else if(name==='instruments'){ instBlock().cells=CELLS.map(c=>c.id); }
        else if(cellIds.includes(name)){ const b=instBlock(); if(!b.cells.includes(name))b.cells.push(name); }
        else return hint('unknown: '+name);
      }
      apply(); return hint('');
    }
    case 'remove': case 'hide': case 'close': {
      for(const name of args.split(/[\s,]+/)){
        if(isView(name))layout.blocks=layout.blocks.filter(b=>!(b.kind==='view'&&b.name===name));
        else if(name==='instruments')layout.blocks=layout.blocks.filter(b=>b.kind!=='inst');
        else if(cellIds.includes(name)){ const b=layout.blocks.find(x=>x.kind==='inst'); if(b)b.cells=b.cells.filter(c=>c!==name); }
      }
      apply(); return hint('');
    }
    case 'only': {
      layout.blocks=[];
      command('add '+args); return hint('');
    }
    case 'full': { const b=layout.blocks.find(x=>x.kind==='view'&&x.name===args); if(b){ b.full=!b.full; apply(); } return hint(''); }
    case 'reset': layout=defaultLayout(); apply(); return hint('');
    case 'sim': setSim(args!=='off'); return hint('');
    case 'connect': { if(args&&SK){ SK.connect(args); return hint('connecting '+args+'…'); } return hint('connect host:port'); }
    default:
      return hint('verbs: add/show · remove/hide · only · full <view> · reset · sim on|off · connect host:port');
  }
}
$('cmd').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ command($('cmd').value); $('cmd').value=''; }
});

// ── data plumbing (Signal K bridge; page sim fallback) ──
function setCell(id,text,src){
  const v=$('v-'+id); if(!v)return;
  v.textContent=text; const s=$('s-'+id); if(s)s.textContent=src;
  const c=$('cell-'+id); if(c)c.classList.remove('stale');
}
const latest={};
function refreshAllCells(){ for(const id of Object.keys(latest)){ const L=latest[id]; setCell(id,L.text,L.src); } }
function feed(id,text,src){ latest[id]={text,src}; setCell(id,text,src); }

const SK=window.meridian&&window.meridian.signalk;
let skOn=false;
if(SK){
  SK.onEvent(ev=>{
    if(ev.type==='status'){
      skOn=!!ev.connected;
      if(skOn){ setSim(false); $('liveStamp').textContent='SK LIVE · '+ev.host; }
    }
    if(ev.type==='delta'&&skOn){
      const cell=CELLS.find(c=>c.path===ev.path); if(!cell)return;
      const val=ev.display!=null?ev.display:ev.si; if(val==null)return;
      try{ feed(cell.id,cell.fmt(val),'signal k'); }catch(e){}
    }
  });
}

// page simulator — plausible sailing numbers, ALWAYS badged
let simOn=false,simTimer=null;
const wander=(v,rate,min,max)=>Math.max(min,Math.min(max,v+(Math.random()-0.5)*rate));
const sim={ sog:6.8, stw:6.5, cog:214, hdg:210, tws:14, twd:250, depth:48, wtemp:22.4, drift:0.7, set:120, lat:25.0781, lon:-77.44 };
function simTick(){
  sim.sog=wander(sim.sog,0.3,4.5,9.5); sim.stw=wander(sim.stw,0.3,4.2,9.2);
  sim.cog=(sim.cog+(Math.random()-0.5)*2+360)%360; sim.hdg=(sim.cog+(Math.random()-0.5)*6+360)%360;
  sim.tws=wander(sim.tws,0.5,6,26); sim.twd=(sim.twd+(Math.random()-0.5)*3+360)%360;
  sim.depth=wander(sim.depth,1.5,8,900); sim.wtemp=wander(sim.wtemp,0.05,18,29);
  sim.drift=wander(sim.drift,0.06,0,2.2); sim.set=(sim.set+(Math.random()-0.5)*4+360)%360;
  const spd=sim.sog/3600, rad=sim.cog*Math.PI/180;
  sim.lat+=spd*Math.cos(rad)/60; sim.lon+=spd*Math.sin(rad)/(60*Math.cos(sim.lat*Math.PI/180));
  const twaRel=((sim.twd-sim.hdg+540)%360)-180;
  const tx=sim.tws*Math.sin(twaRel*Math.PI/180), ty=sim.tws*Math.cos(twaRel*Math.PI/180)+sim.stw;
  const aws=Math.hypot(tx,ty), awa=Math.atan2(tx,ty)*180/Math.PI;
  const tag='simulated';
  feed('sog',sim.sog.toFixed(1),tag); feed('stw',sim.stw.toFixed(1),tag);
  feed('cog',String(Math.round(sim.cog)).padStart(3,'0'),tag); feed('hdg',String(Math.round(sim.hdg)).padStart(3,'0'),tag);
  feed('tws',sim.tws.toFixed(1),tag); feed('twd',String(Math.round(sim.twd)).padStart(3,'0'),tag);
  feed('aws',aws.toFixed(1),tag); feed('awa',(awa>0?'+':'')+Math.round(awa),tag);
  feed('depth',sim.depth.toFixed(1),tag); feed('wtemp',sim.wtemp.toFixed(1),tag);
  feed('drift',sim.drift.toFixed(1),tag); feed('set',String(Math.round(sim.set)).padStart(3,'0'),tag);
  feed('pos',fmtLat(sim.lat)+'  ·  '+fmtLon(sim.lon),tag);
}
function setSim(on){
  simOn=on;
  $('simBadge').classList.toggle('on',on);
  if(simTimer){ clearInterval(simTimer); simTimer=null; }
  if(on){ simTimer=setInterval(simTick,1000); simTick(); $('liveStamp').textContent='SIM'; }
}
setSim(true);
renderBoard();

// control hooks for /eval + the MCP agent (same grammar as the human)
window.m={ command, layout:()=>JSON.parse(JSON.stringify(layout)),
  state:()=>({ sim:simOn, skConnected:skOn, blocks:layout.blocks.map(b=>b.kind==='inst'?'inst('+b.cells.length+')':b.name) }) };
console.log('[helm] ready — window.m.command(text) drives the pane');
</script>
</body>
</html>
